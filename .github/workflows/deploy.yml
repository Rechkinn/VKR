name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-folder
          path: dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Fix permissions on server (ensure deploy user owns VKR)
        run: |
          ssh -i ~/.ssh/vps_key -p 1045 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            # Используем переменную пользователя, а не 'aleks'
            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} /home/${{ secrets.VPS_USER }}/VKR/ || true
            sudo chmod -R 775 /home/${{ secrets.VPS_USER }}/VKR/ || true
            # Убедимся что dist существует
            mkdir -p /home/${{ secrets.VPS_USER }}/VKR/dist
            echo '✅ Permissions and dist directory ensured'
          "

      - name: Inspect remote dist before deploy (debug)
        run: |
          ssh -i ~/.ssh/vps_key -p 1045 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo 'Remote: ls -la /home/${{ secrets.VPS_USER }}/VKR'
            ls -la /home/${{ secrets.VPS_USER }}/VKR || true
            echo 'Remote: ls -la /home/${{ secrets.VPS_USER }}/VKR/dist'
            ls -la /home/${{ secrets.VPS_USER }}/VKR/dist || true
          "

      - name: Deploy with Rsync (use sudo on remote rsync if needed)
        run: |
          # локальный debug
          echo "PWD: $(pwd)"
          ls -la ./dist
          find ./dist -maxdepth 2 -type f -print

          # Основной rsync. Если ваш ssh-пользователь имеет passwordless sudo,
          # и целевые файлы принадлежат другому юзеру (root/www-data), 
          # раскомментируйте --rsync-path="sudo rsync"
          rsync -avz --progress \
            -e "ssh -i ~/.ssh/vps_key -p 1045 -o StrictHostKeyChecking=no" \
            --no-times \
            --no-perms \
            --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r \
            --delete \
            ./dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/VKR/dist/

          # Если выше выдаст Permission denied, попробуйте вариант с sudo на удалённой стороне:
          # rsync -avz --progress \
          #   -e "ssh -i ~/.ssh/vps_key -p 1045 -o StrictHostKeyChecking=no" \
          #   --no-times --no-perms --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r --delete \
          #   --rsync-path="sudo rsync" \
          #   ./dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/VKR/dist/

      - name: Set correct permissions after deploy
        run: |
          ssh -i ~/.ssh/vps_key -p 1045 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            # Устанавливаем правильные права после деплоя
            chmod -R 755 /home/aleks/VKR/dist/
            chown -R ${{ secrets.VPS_USER }}:www-data /home/aleks/VKR/dist/ 2>/dev/null || true
            echo '✅ Final permissions set'
          "

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/vps_key -p 1045 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo '📁 Deployment verified:'
            ls -la /home/aleks/VKR/dist/
            echo '📊 Directory size:'
            du -sh /home/aleks/VKR/dist/
            echo '🔐 Permissions:'
            ls -la /home/aleks/VKR/ | grep dist
          "
