name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-folder
          path: dist/

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy with password authentication
        run: |
          sshpass -p "${{ secrets.VPS_ALEKS_PASSWORD }}" \
          rsync -avz --progress \
            --delete \
            -e "ssh -p 1045 -o StrictHostKeyChecking=no" \
            ./dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/aleks/VKR/dist/

      - name: Verify deployment
        run: |
          sshpass -p "${{ secrets.VPS_ALEKS_PASSWORD }}" \
          ssh -p 1045 -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo '✅ Deployment verified:'
            ls -la /home/aleks/VKR/dist/
            echo '📊 Directory size:'
            du -sh /home/aleks/VKR/dist/
          "
