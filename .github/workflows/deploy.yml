name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-folder
          path: dist/

      - name: Setup SSH with key
        run: |
          mkdir -p ~/.ssh/
          chmod 700 ~/.ssh/
          # Сохраняем приватный ключ
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

          # Отключаем проверку хоста
          echo "Host ${{ secrets.VPS_HOST }}" >> ~/.ssh/config
          echo "  HostName ${{ secrets.VPS_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.VPS_USER }}" >> ~/.ssh/config
          echo "  Port 1045" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/vps_key" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config

          echo "✅ SSH configuration completed"

      - name: Test SSH connection
        run: |
          echo "Testing connection to server..."
          ssh ${{ secrets.VPS_HOST }} "echo '✅ SSH connection successful'"

      - name: Deploy with Rsync
        run: |
          rsync -avz --progress \
            --delete \
            ./dist/ \
            ${{ secrets.VPS_HOST }}:/home/aleks/VKR/dist/

      - name: Verify deployment
        run: |
          ssh ${{ secrets.VPS_HOST }} "
            echo '📁 Deployment verified:'
            ls -la /home/aleks/VKR/dist/
            echo '📊 Directory size:'
            du -sh /home/aleks/VKR/dist/
          "
