name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-folder
          path: dist/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-folder
          path: dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Fix permissions on server
        run: |
          ssh -i ~/.ssh/vps_key -p 1045 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            # Даем права пользователю aleks на папку VKR
            sudo chown -R ${{ secrets.VPS_USER }}:${{ secrets.VPS_USER }} /home/aleks/VKR/
            sudo chmod -R 755 /home/aleks/VKR/
            echo '✅ Permissions fixed'
          "

      - name: Clean remote directory before deploy
        run: |
          ssh -i ~/.ssh/vps_key -p 1045 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            # Очищаем папку dist, если она существует
            if [ -d '/home/aleks/VKR/dist' ]; then
              rm -rf /home/aleks/VKR/dist/*
              echo '✅ Remote dist directory cleaned'
            else
              mkdir -p /home/aleks/VKR/dist
              echo '✅ Remote dist directory created'
            fi
          "

      - name: Deploy with Rsync (no permission changes)
        run: |
          # Debug: покажем текущую папку и содержимое dist
          echo "PWD: $(pwd)"
          ls -la
          echo "Contents of ./dist:"
          ls -la ./dist || (echo "ERROR: ./dist not found" && exit 1)

          rsync -avz --progress \
            -e "ssh -i ~/.ssh/vps_key -p 1045 -o StrictHostKeyChecking=no" \
            --no-times \
            --no-perms \
            --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r \
            --delete \
            ./dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/aleks/VKR/dist/

      - name: Set correct permissions after deploy
        run: |
          ssh -i ~/.ssh/vps_key -p 1045 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            # Устанавливаем правильные права после деплоя
            chmod -R 755 /home/aleks/VKR/dist/
            chown -R ${{ secrets.VPS_USER }}:www-data /home/aleks/VKR/dist/ 2>/dev/null || true
            echo '✅ Final permissions set'
          "

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/vps_key -p 1045 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            echo '📁 Deployment verified:'
            ls -la /home/aleks/VKR/dist/
            echo '📊 Directory size:'
            du -sh /home/aleks/VKR/dist/
            echo '🔐 Permissions:'
            ls -la /home/aleks/VKR/ | grep dist
          "
